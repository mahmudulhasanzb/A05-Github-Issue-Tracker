<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker</title>

  <!-- font awesome  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- font integration  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet" />

  <!-- tailwind+daisyui  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>

<body class="min-h-screen max-w-md mx-auto">
  
  <section">
    <div class="hero bg-base-200 min-h-screen max-w-[90%] mx-auto m-8 rounded-xl shadow-md">
      <div class="hero-content flex-col  w-full">
        <img class="w-20" src="./assets/github-logo.png">
        
        <div class="text-center space-y-2">
          <h1 class="text-2xl font-bold">Github Issue Tracker</h1>
          <p class="text-gray-500">
            Sign in to manage your issues
          </p>
        </div>
<!-- input field -->
        <div class="card w-full max-w-sm shrink-0 mx-auto">
            <fieldset class="fieldset">
              <label class="label text-sm font-semibold  text-[#1F2937]">Username</label>
              <input id="username" type="text" class="input w-full" placeholder="Enter Username" />

              <p class="text-primary font-semibold mb-2">Default: <span >admin</span></p>

              <label class="label font-semibold text-sm text-[#1F2937]">Password</label>
              <input id="password" type="password" class="input w-full" placeholder="Enter Password" />

              <p class="text-primary font-semibold">Default: <span >admin123</span></p>

              <button onclick="signIn()" id="sign-in-btn" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </div>

<!-- Or demo credential -->
        <div class="divider text-[#1F2937]">
          <span>OR</span>
        </div>
        
        <div class="demo-credentials w-full text-center text-[#1F2937]">
          <p class="mb-2">Demo Credentials:</p>
          <div class="bg-gray-100 p-6 rounded-md">
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> admin123</p>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="script/login.js"></script>
</body>

</html>
